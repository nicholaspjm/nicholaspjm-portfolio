name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishes the static export to the gh-pages branch. Pages then serves
# that branch via its classic static pipeline (reliable, unlike the
# artifact-based actions/deploy-pages path which stalls on new sites).
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /nicholaspjm-portfolio
        run: npm run build

      # Keep GitHub Pages from stripping the _next/ directory.
      - run: touch out/.nojekyll

      - name: Publish out/ to gh-pages
        run: |
          cd out
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
