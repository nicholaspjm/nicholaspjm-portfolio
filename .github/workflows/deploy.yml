name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          # Project site lives under /<repo>; matches next.config basePath.
          NEXT_PUBLIC_BASE_PATH: /nicholaspjm-portfolio
        run: npm run build

      # Stop GitHub Pages' Jekyll from dropping the _next/ directory.
      - run: touch out/.nojekyll

      # enablement: turns Pages on (source = GitHub Actions) automatically,
      # so no manual Settings toggle is needed once the repo is public.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
