name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishes the static export to the gh-pages branch as a normal commit on
# top of the existing history (NOT a force-pushed orphan — that jammed
# GitHub's Pages builder, wedging builds in "building"), then sends one
# gentle build nudge.
permissions:
  contents: write
  pages: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /nicholaspjm-portfolio
        run: npm run build

      # Keep GitHub Pages from stripping the _next/ directory.
      - run: touch out/.nojekyll

      - name: Publish out/ to gh-pages (linear history, no force-push)
        run: |
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Check out the existing gh-pages branch, or start it as an orphan once.
          if git clone --branch gh-pages --depth 1 "$remote" publish 2>/dev/null; then
            find publish -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          else
            git clone --depth 1 "$remote" publish
            ( cd publish && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
          fi
          cp -a out/. publish/
          touch publish/.nojekyll
          cd publish
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"; exit 0
          fi
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub auto-builds Pages from the gh-pages push, but that can wedge.
      # Give the auto-build time to start, then send ONE gentle nudge — do
      # NOT loop/re-kick, since rapid concurrent build requests make Pages
      # error them out ("Page build failed").
      - name: Nudge Pages build (single request)
        run: |
          sleep 45
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" \
            -o /dev/null -w "pages build nudge: HTTP %{http_code}\n" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
