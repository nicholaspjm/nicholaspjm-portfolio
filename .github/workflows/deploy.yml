name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishes the static export to the gh-pages branch, then explicitly
# requests a Pages build. GitHub's auto-trigger sometimes wedges after a
# force-push (build stuck in "building" indefinitely); requesting the build
# via the API reliably kicks it, so deploys don't silently stall.
permissions:
  contents: write
  pages: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /nicholaspjm-portfolio
        run: npm run build

      # Keep GitHub Pages from stripping the _next/ directory.
      - run: touch out/.nojekyll

      - name: Publish out/ to gh-pages
        run: |
          cd out
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request a fresh Pages build (unstick the queue)
        run: |
          sleep 5
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" \
            -o /dev/null -w "pages build request: HTTP %{http_code}\n" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
